name: Release Native Libraries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos
            os: macos-latest
            lib_name: libportix_serv.dylib
            asset_name: libportix_serv_macos.dylib

          - target: linux
            os: ubuntu-latest
            lib_name: libportix_serv.so
            asset_name: libportix_serv_linux.so

          - target: windows
            os: windows-latest
            lib_name: portix_serv.dll
            asset_name: portix_serv_windows.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact - Unix
        if: matrix.target != 'windows'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.lib_name }} dist/${{ matrix.asset_name }}

      - name: Prepare artifact - Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/release/${{ matrix.lib_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.asset_name }}